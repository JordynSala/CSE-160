<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <title>Draw a blue rectangle (canvas version)</title>
    </head>

    <body onload="main()">
        <canvas id="example" width="400" height="400"></canvas>
        <script src="lib/cuon-matrix-cse160.js"></script> 
        <script src="asg0.js"></script>
        <br>
        <!-- v1 Vector -->
        <label for="v1">v1: x</label>
        <input type="text" id="xcoord1" name="xcoord1">
        <label for="v1"> y</label>
        <input type="text" id="ycoord1" name="ycoord1">
        <br>
        <!-- v2 Vector -->
        <label for="v2">v2: x</label>
        <input type="text" id="xcoord2" name="xcoord2">
        <label for="v2"> y</label>
        <input type="text" id="ycoord2" name="ycoord2">
        <br>
        <!-- Draw  -->
        <button onclick="handleDrawEvent()">Draw</button>
        <br> <br>
        <!-- Operation -->
        <label for="opt">Operation: </label>
        <select id="opt">
            <option value="Add">Add</option>
            <option value="Subtract">Subtract</option>
            <option value="Multiply">Multiply</option>
            <option value="Divide">Divide</option>
            <option value="Magnitude">Magnitude</option>
            <option value="Normalize">Normalize</option>
            <option value="Angle">Angle between</option>
            <option value="Area">Area</option>
        </select>

        <!-- Scalar -->
        <label for="opt">Scalar: </label>
        <input type="text" id="scalar" name="scalar">
        <br>

        <!-- Draw 2 Button -->
        <button onclick="handleDrawOperationEvent()">Draw</button>
    </body>
    

</html>
