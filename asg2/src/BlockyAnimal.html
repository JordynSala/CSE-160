<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8"/>
        <title>Blocky Panda</title>
    </head>

    <body onload="main()">
        <canvas id="webgl" width="400" height="400">
        </canvas>
        <p>
        <!--<button type="button" id="clearButton">Clear Canvas</button>--> 
        <p>
        <!--<b>Drawing Mode</b>--> 
        <p>
        <!--<button type="button" id="pointButton">Square</button>--> 
        <!--<button type="button" id="triangleButton">Triangle</button>--> 
        <!--<button type="button" id="circleButton">Circle</button>--> 
        <p>
        <p id="numdot"> ms: -- fps: --</p>
        <p>
        <p>
        Animation:
        <button type="button" id="animateOnButton">ON</button>
        <button type="button" id="animateOffButton">OFF</button>
        <p>
        <b>Joint Controls</b>
        <p>
        All Joints <input type="range" min="-45" max="45" value="0" class="slider" id="allJointsSlide">
        <p>
        Head <input type="range" min="-45" max="45" value="0" class="slider" id="headJointSlide">
        <p>
        Front Left Leg <input type="range" min="-60" max="60" value="0" class="slider" id="frontLeftLegSlide">
        <p>
        Front Right Leg <input type="range" min="-60" max="60" value="0" class="slider" id="frontRightLegSlide">
        <p>
        Back Left Leg <input type="range" min="-60" max="60" value="0" class="slider" id="backLeftLegSlide">
        <p>
        Back Right Leg <input type="range" min="-60" max="60" value="0" class="slider" id="backRightLegSlide">
        <p>
        
        <p>
        Camera Angle <input type="range" min="0" max="90" value="45" class="slider" id="angleSlide">
        

        <div style="display:none;">
            <input type="range" id="redSlide" min="0" max="100" value="100">
            <input type="range" id="magentaSlide" min="-45" max="45" value="0">
            <input type="range" id="yellowSlide" min="-45" max="45" value="0">
            <button type="button" id="animateYellowOnButton"></button>
            <button type="button" id="animateYellowOffButton"></button>
        </div>
       
        
        <script src="lib/webgl-utils.js"></script>
        <script src="lib/webgl-debug.js"></script>
        <script src="lib/cuon-utils.js"></script>
        <script src="lib/cuon-matrix-cse160.js"></script>
        <script src="Triangle.js?v=20260421"></script>
        <script src="Circle.js?v=20260421"></script>
        <script src="Point.js?v=20260421"></script> 
        <script src="Cube.js?v=20260421"></script>
        <script src="Cylinder.js?v=20260421"></script>
        <script src="BlockyAnimal.js?v=20260421"></script>
        <script src="Panda.js?v=20260421"></script>


    </body>
</html>
